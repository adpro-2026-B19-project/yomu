<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomu</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(160deg, #eef5ff 0%, #f8fbff 100%);
            color: #0f172a;
        }
        .card {
            width: min(640px, 92vw);
            border: 1px solid #dbe4f0;
            border-radius: 14px;
            background: #ffffff;
            padding: 28px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }
        p {
            margin: 0 0 18px 0;
            line-height: 1.5;
        }
        a {
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            color: #ffffff;
            background: #1d4ed8;
            border-radius: 10px;
            padding: 10px 16px;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Yomu Group Project</h1>
    <p>Application is running. Open the auth integration page to test frontend-backend-database connectivity.</p>
    <a th:href="@{/auth}">Open Auth Demo</a>
</main>
</body>
</html>
