<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <title>Yomu · Error</title>

    <style>

        :root{
            --primary:#3B82F6;
            --bg:#0F172A;
            --card:#1E293B;
            --border:#334155;
            --text:#E2E8F0;
            --muted:#94A3B8;
            --panel:#020617;
        }

        *{box-sizing:border-box;}

        body{
            margin:0;
            font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
            background:var(--bg);
            color:var(--text);
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:min(720px,95vw);
        }

        .card{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:18px;
            padding:30px;
            text-align:center;
        }

        .mascot{
            width:160px;
            height:160px;
            margin:0 auto 20px auto;
            border-radius:20px;
            border:2px dashed var(--border);
            background:var(--panel);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:12px;
            color:var(--muted);
        }

        h1{
            margin:10px 0;
            font-size:28px;
        }

        .message{
            color:var(--muted);
            margin-bottom:20px;
            line-height:1.5;
        }

        .code{
            font-size:14px;
            color:var(--muted);
            margin-bottom:20px;
        }

        .actions{
            display:flex;
            justify-content:center;
            gap:12px;
            flex-wrap:wrap;
        }

        .btn{
            padding:10px 16px;
            border-radius:12px;
            border:1px solid var(--border);
            background:var(--panel);
            color:var(--text);
            font-weight:700;
            cursor:pointer;
            text-decoration:none;
        }

        .btn.primary{
            background:var(--primary);
            border-color:var(--primary);
            color:white;
        }

        .btn:hover{
            filter:brightness(1.05);
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="mascot">
            Mascot Placeholder
        </div>

        <h1 th:text="${errorTitle} ?: 'Something went wrong'">
            Something went wrong
        </h1>

        <div class="message"
             th:text="${errorMessage} ?: 'The page you are looking for could not be found or you do not have permission to access it.'">
            The page you are looking for could not be found.
        </div>

        <div class="code">
            Error code: <span th:text="${status} ?: 'Unknown'">404</span>
        </div>

        <div class="actions">

            <a th:href="@{/}" class="btn primary">
                Return Home
            </a>

            <button onclick="history.back()" class="btn">
                Go Back
            </button>

        </div>

    </div>

</div>

</body>
</html>
