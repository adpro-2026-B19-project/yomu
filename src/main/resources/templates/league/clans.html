<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Yomu - Clan</title>
    <style>
        :root{
            --bg:#0F172A;
            --panel:#020617;
            --card:#1E293B;
            --border:#334155;
            --text:#E2E8F0;
            --muted:#94A3B8;
            --primary:#3B82F6;
            --danger:#F87171;
            --success:#34D399;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);}
        a{color:inherit;text-decoration:none;}
        .container{width:min(1100px,92vw);margin:0 auto;}
        header{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--border);}
        .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:12px;flex-wrap:wrap;}
        .brand{font-weight:800;}
        .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        .btn{display:inline-flex;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-weight:700;}
        .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
        .wrap{padding:28px 0 40px;display:grid;gap:18px;}
        .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
        .muted{color:var(--muted);}
        .title{margin:0 0 8px;}
        form{display:grid;gap:10px;}
        label{font-size:13px;font-weight:700;}
        input{
            width:100%;
            padding:10px 12px;
            border-radius:10px;
            border:1px solid var(--border);
            background:rgba(2,6,23,.55);
            color:var(--text);
            outline:none;
        }
        input:focus{border-color:rgba(59,130,246,.65);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
        .error{color:var(--danger);font-size:13px;}
        .alert{padding:10px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:12px;}
        .alert.success{border-color:rgba(52,211,153,.45);color:var(--success);}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:10px 8px;border-bottom:1px solid rgba(148,163,184,.18);text-align:left;}
        th{font-size:13px;color:var(--muted);}
        @media (max-width:700px){
            th:nth-child(4), td:nth-child(4){display:none;}
        }
    </style>
</head>
<body>
<header>
    <div class="container nav">
        <a class="brand" th:href="@{/}">Yomu</a>
        <nav class="actions">
            <span class="muted" th:if="${loggedInName != null and !#strings.isEmpty(loggedInName)}"
                  th:text="'Hello, ' + ${loggedInName}">Hello, user</span>
            <a class="btn" th:href="@{/profile}">Profile</a>
            <form th:action="@{/auth/logout}" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn">Logout</button>
            </form>
        </nav>
    </div>
</header>

<main class="container wrap">
    <section class="card">
        <h1 class="title">Create Clan</h1>

        <div class="alert success" th:if="${success != null}" th:text="${success}">Clan created successfully</div>

        <form th:action="@{/clans}" method="post" th:object="${createForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label for="name">Clan Name</label>
            <input id="name" type="text" maxlength="60" required th:field="*{name}" placeholder="Example: Code Masters"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
            <button type="submit" class="btn primary">Create Clan</button>
        </form>
    </section>

    <section class="card">
        <h2 class="title">Clan List</h2>
        <p class="muted" th:if="${#lists.isEmpty(clans)}">No clan yet.</p>
        <div th:unless="${#lists.isEmpty(clans)}">
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Tier</th>
                    <th>Members</th>
                    <th>Created By</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="clan : ${clans}">
                    <td th:text="${clan.name}">Code Masters</td>
                    <td th:text="${clan.tier}">BRONZE</td>
                    <td th:text="${clan.memberCount}">1</td>
                    <td th:text="${clan.createdByName}">creator</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
