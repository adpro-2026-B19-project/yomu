<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Achievements - Yomu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        nav {
            background-color: #0d1117;
            border-bottom: 1px solid #21262d;
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #e6edf3;
            text-decoration: none;
        }
        .nav-logo {
            width: 32px; height: 32px;
            background: #1f6feb;
            border-radius: 8px;
        }
        .nav-links { display: flex; gap: 12px; align-items: center; }
        .btn-outline {
            padding: 7px 16px;
            border: 1px solid #30363d;
            background: transparent;
            color: #e6edf3;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .btn-outline:hover { background: #21262d; }
        .btn-primary {
            padding: 7px 16px;
            background: #1f6feb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .btn-primary:hover { background: #388bfd; }

        /* ── Page Content ── */
        .container {
            max-width: 1000px;
            margin: 48px auto;
            padding: 0 24px;
        }

        .page-header { margin-bottom: 32px; }
        .page-header h1 {
            font-size: 2rem;
            font-weight: bold;
            color: #e6edf3;
            margin-bottom: 8px;
        }
        .page-header p {
            color: #8b949e;
            font-size: 0.95rem;
        }

        /* ── Admin Form Card ── */
        .admin-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .admin-card h2 {
            font-size: 1rem;
            color: #e6edf3;
            margin-bottom: 16px;
        }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-row input {
            flex: 1;
            min-width: 180px;
            padding: 9px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 0.9rem;
        }
        .form-row input::placeholder { color: #484f58; }
        .form-row input:focus {
            outline: none;
            border-color: #1f6feb;
        }
        .btn-submit {
            padding: 9px 20px;
            background: #1f6feb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .btn-submit:hover { background: #388bfd; }

        /* ── Achievement Grid ── */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .achievement-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s, transform 0.2s;
        }
        .achievement-card:hover {
            border-color: #1f6feb;
            transform: translateY(-2px);
        }

        .achievement-icon {
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        .achievement-badge {
            display: inline-block;
            background: #1f2d3d;
            color: #388bfd;
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid #1f6feb44;
            margin-bottom: 10px;
            letter-spacing: 0.03em;
        }

        .achievement-card h3 {
            font-size: 1rem;
            color: #e6edf3;
            margin-bottom: 6px;
        }

        .achievement-card p {
            font-size: 0.875rem;
            color: #8b949e;
            line-height: 1.5;
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #484f58;
        }
        .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-state h2 { font-size: 1.2rem; color: #8b949e; margin-bottom: 8px; }
        .empty-state p { font-size: 0.9rem; }

        /* ── Footer ── */
        footer {
            border-top: 1px solid #21262d;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            color: #484f58;
            font-size: 0.85rem;
            margin-top: 80px;
        }
        footer a { color: #484f58; text-decoration: none; }
        footer a:hover { color: #8b949e; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav>
    <a href="/" class="nav-brand">
        <div class="nav-logo"></div>
        Yomu
    </a>
    <div class="nav-links">
        <a href="/login" class="btn-outline" sec:authorize="isAnonymous()">Login</a>
        <a href="/register" class="btn-primary" sec:authorize="isAnonymous()">Register</a>
        <a href="/logout" class="btn-outline" sec:authorize="isAuthenticated()">Logout</a>
    </div>
</nav>

<!-- Main Content -->
<div class="container">

    <div class="page-header">
        <h1>🏆 Achievements</h1>
        <p>Track your milestones and accomplishments on Yomu.</p>
    </div>

    <!-- Admin: Create Achievement Form -->
    <div class="admin-card" sec:authorize="hasRole('ADMIN')">
        <h2>Create New Achievement</h2>
        <form th:action="@{/achievements/api}" method="post" class="form-row">
            <input type="text" name="name" placeholder="Achievement name" required/>
            <input type="text" name="milestone" placeholder="Milestone (e.g. Complete 10 readings)" required/>
            <button type="submit" class="btn-submit">+ Create</button>
        </form>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(achievements)}" class="empty-state">
        <div class="empty-icon">🎯</div>
        <h2>No achievements yet</h2>
        <p>Achievements will appear here once they are created by an admin.</p>
    </div>

    <!-- Achievement Cards -->
    <div th:unless="${#lists.isEmpty(achievements)}" class="achievement-grid">
        <div class="achievement-card" th:each="achievement : ${achievements}">
            <div class="achievement-icon">🏅</div>
            <span class="achievement-badge">Achievement</span>
            <h3 th:text="${achievement.name}">Achievement Name</h3>
            <p th:text="${achievement.milestone}">Milestone description</p>
        </div>
    </div>

</div>

<!-- Footer -->
<footer>
    <span>(c) 2026 Yomu</span>
    <div style="display:flex; gap: 16px;">
        <a href="#">About</a>
        <a href="#">Team</a>
        <a href="#">Contact</a>
    </div>
</footer>

</body>
</html>
