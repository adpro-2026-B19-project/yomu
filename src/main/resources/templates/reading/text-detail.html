<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${text.title}">Detail Bacaan</title>
    <style>
        :root{ --primary:#3B82F6; --accent:#F59E0B; --bg:#0F172A; --card:#1E293B; --border:#334155; --text:#E2E8F0; --muted:#94A3B8; --panel:#020617; }
        *{box-sizing:border-box;}
        body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);}
        a{color:inherit;text-decoration:none;}

        .container{width:min(800px,92vw);margin:0 auto;} /* Lebih sempit untuk fokus membaca */
        header{background:var(--panel);border-bottom:1px solid var(--border); padding: 14px 0;}
        .nav{display:flex;align-items:center; gap: 14px;}

        .btn{display:inline-flex;align-items:center;padding:8px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-weight:700;font-size:14px;}
        .btn:hover{background:var(--border);}

        article { margin-top: 40px; }
        .meta { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        .badge { padding: 4px 10px; background: rgba(245, 158, 11, 0.15); color: var(--accent); border-radius: 8px; font-size: 13px; font-weight: 700; }

        h1 { font-size: 32px; line-height: 1.2; margin: 0 0 30px; }

        .content-area { font-size: 18px; line-height: 1.8; color: #cbd5e1; white-space: pre-wrap; }

        .quiz-lock { margin-top: 60px; padding: 30px; background: var(--card); border: 1px dashed var(--border); border-radius: 18px; text-align: center; }
        .quiz-title { font-weight: 800; font-size: 18px; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

<header>
    <div class="container nav">
        <a class="btn" th:href="@{/texts}">&larr; Kembali</a>
        <span style="font-weight: 700;">Yomu Reader</span>
    </div>
</header>

<main class="container">
    <article>
        <div class="meta">
            <span class="badge" th:text="${text.category.name}">Teknologi</span>
            <span style="color:var(--muted); font-size: 14px;">Oleh Admin</span>
        </div>

        <h1 th:text="${text.title}">Judul Artikel</h1>

        <div class="content-area" th:text="${text.content}">
            Isi konten akan muncul di sini...
        </div>
    </article>

    <div class="quiz-lock">
        <span class="quiz-title">🔒 Kuis Tersedia Setelah Membaca</span>
        <span style="color: var(--muted);">Fitur pengerjaan kuis akan hadir pada update berikutnya.</span>
    </div>

    <div style="height: 100px;"></div> </main>

</body>
</html>
