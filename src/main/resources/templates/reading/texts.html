<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Yomu - Daftar Bacaan</title>
    <style>
        /* Mengcopy Style Dasar dari Login/Register agar konsisten */
        :root{ --primary:#3B82F6; --accent:#F59E0B; --bg:#0F172A; --card:#1E293B; --border:#334155; --text:#E2E8F0; --muted:#94A3B8; --danger:#F87171; --success:#34D399; --panel:#020617; }
        *{box-sizing:border-box;}
        body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);}
        a{color:inherit;text-decoration:none;}

        .container{width:min(1100px,92vw);margin:0 auto;}
        header{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--border); z-index: 10;}
        .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:14px;}
        .brand{display:flex;align-items:center;gap:10px;font-weight:800;}
        .logo-box{width:34px;height:34px;border-radius:10px;background:var(--primary);}

        .btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);font-weight:700;color:var(--text); font-size: 14px;}
        .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
        .btn:hover{filter:brightness(1.1);}

        /* Style Khusus Halaman List */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 20px; }
        h1 { font-size: 24px; margin: 0; }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); border-color: var(--primary); }

        .card-cat { display: inline-block; padding: 4px 10px; background: rgba(59,130,246,0.15); color: var(--primary); border-radius: 8px; font-size: 12px; font-weight: 700; margin-bottom: 12px; width: fit-content;}
        .card h2 { margin: 0 0 10px; font-size: 18px; }
        .card p { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 0 0 20px; flex-grow: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .empty-state { text-align: center; padding: 60px 0; color: var(--muted); border: 2px dashed var(--border); border-radius: 18px; margin-top: 20px;}
    </style>
</head>
<body>

<header>
    <div class="container nav">
        <a class="brand" th:href="@{/}">
            <div class="logo-box" aria-hidden="true"></div>
            <span>Yomu</span>
        </a>
        <nav>
            <a class="btn" th:href="@{/auth/login?logout}">Logout</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="page-header">
        <h1>Daftar Bacaan</h1>
        <a th:href="@{/admin/texts/create}" class="btn primary">+ Buat Bacaan</a>
    </div>

    <div th:if="${texts.empty}" class="empty-state">
        <h3>Belum ada bacaan tersedia.</h3>
        <p>Silakan minta admin untuk menambahkan materi baru.</p>
    </div>

    <div class="grid-cards">
        <div class="card" th:each="text : ${texts}">
            <span class="card-cat" th:text="${text.category.name}">Category</span>
            <h2 th:text="${text.title}">Judul Artikel</h2>
            <p th:text="${#strings.abbreviate(text.content, 100)}">Preview konten...</p>
            <a th:href="@{/texts/{id}(id=${text.id})}" class="btn">Baca Selengkapnya &rarr;</a>
        </div>
    </div>
</main>

</body>
</html>
