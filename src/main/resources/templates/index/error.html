<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Yomu - Error</title>
    <style>
        :root{
            --bg:#0F172A;
            --card:#1E293B;
            --border:#334155;
            --text:#E2E8F0;
            --muted:#94A3B8;
            --danger:#F87171;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);}
        .wrap{min-height:100vh;display:grid;place-items:center;padding:24px;}
        .card{width:min(620px,95vw);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;}
        h1{margin:0 0 10px;}
        .muted{color:var(--muted);}
        .status{font-size:34px;font-weight:900;color:var(--danger);margin:8px 0;}
        .actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;}
        .btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:12px;border:1px solid var(--border);color:var(--text);text-decoration:none;}
    </style>
</head>
<body>
<main class="wrap">
    <section class="card">
        <h1>Something went wrong</h1>
        <p class="status" th:text="${statusCode}">500</p>
        <p class="muted" th:text="${errorMessage}">Unexpected error</p>
        <p class="muted" th:if="${errorPath != null and !#strings.isEmpty(errorPath)}">
            Path: <span th:text="${errorPath}">/unknown</span>
        </p>
        <div class="actions">
            <a class="btn" th:href="@{/}">Back to Home</a>
            <a class="btn" th:href="@{/auth/login}">Login</a>
        </div>
    </section>
</main>
</body>
</html>
