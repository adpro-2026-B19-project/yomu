spring.application.name=yomu
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=${H2_WEB_ALLOW_OTHERS:false}
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/yomu-db-v2;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.thymeleaf.cache=false
spring.web.error.whitelabel.enabled=false
spring.web.error.path=/error
