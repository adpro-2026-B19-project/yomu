name: CI Quality Gate

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run test and coverage quality gate
        run: ./gradlew --no-daemon clean test jacocoTestReport jacocoTestCoverageVerification

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            build/reports/tests/test
            build/reports/jacoco/test

  codeql-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build project for CodeQL
        run: ./gradlew --no-daemon clean classes -x test

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
